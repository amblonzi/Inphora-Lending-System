server {
    listen 80;
    server_name tytahj.inphora.net amariflow.inphora.net il.inphora.net;
    server_tokens off;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Route API requests based on subdomain
    location /api/ {
        resolver 127.0.0.11 valid=30s;

        set $backend_host backend_il:8000;

        if ($host = "tytahj.inphora.net") {
            set $backend_host backend_tytahj:8000;
        }

        if ($host = "amariflow.inphora.net") {
            set $backend_host backend_amari:8000;
        }

        if ($host = "il.inphora.net") {
            set $backend_host backend_il:8000;
        }

        proxy_pass http://$backend_host;
        proxy_set_header    Host                $http_host;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto   $scheme;
    }

    # Frontend (same for all subdomains)
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header    Host                $http_host;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto   $scheme;

        # Websocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
