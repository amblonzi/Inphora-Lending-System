# nginx/conf.d/local.conf
# Local Development Nginx Configuration
# Works without SSL and proxies to all three backends

# Upstream backend services
upstream backend_tytahj {
    server backend_tytahj:8000;
}

upstream backend_amariflow {
    server backend_amariflow:8000;
}

upstream backend_il {
    server backend_il:8000;
}

upstream frontend {
    server frontend:80;
}

# Default server - serves frontend
server {
    listen 80 default_server;
    server_name localhost _;

    # Frontend (SPA)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }

    # Static files
    location /static/ {
        root /var/www;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Rate limiting setup
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # API endpoint - default to backend_il
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend_il;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
    }

    # Health check endpoints
    location /_health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    error_page 502 503 504 /5xx.html;
    location = /5xx.html {
        internal;
        default_type text/html;
        return 502 "Bad Gateway";
    }
}

# Tytahj tenant virtual host
server {
    listen 80;
    server_name tytahj.localhost localhost:8080;

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend_tytahj;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }
}

