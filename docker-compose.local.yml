services:
  # Shared MariaDB for all local backends
  db_local:
    image: mariadb:10.6
    container_name: inphora_db_local
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tytahjdb
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Redis for session management and caching
  redis:
    image: redis:7-alpine
    container_name: inphora_redis_local
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app_network

  # Backend for Tytahj (Default Local Client)
  backend_tytahj:
    build: ./backend
    container_name: inphora_backend_tytahj_local
    restart: always
    environment:
      DATABASE_URL: mysql+pymysql://root:root@db_local/tytahjdb
      SECRET_KEY: local_secret_key_123
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 43200
      ENVIRONMENT: development
      DEBUG: "True"
      REDIS_URL: redis://redis:6379/0
      DB_INIT_ON_START: "false"
    depends_on:
      db_local:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app_network
    ports:
      - "8001:8000"

  # Frontend
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8001
    container_name: inphora_frontend_local
    restart: always
    networks:
      - app_network
    ports:
      - "5173:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro

volumes:
  db_data:

networks:
  app_network:
    driver: bridge
