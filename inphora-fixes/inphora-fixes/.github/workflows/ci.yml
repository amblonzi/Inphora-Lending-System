# .github/workflows/ci.yml — NEW (WARN-03)
# CI: lint + test on every push
# CD: deploy to server on push to master

name: CI / CD

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  # ── Backend Lint & Test ─────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports: ["3306:3306"]
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Lint with ruff
        run: |
          cd backend
          ruff check . --select=E,W,F,I --ignore=E501

      - name: Run tests
        env:
          DB_HOST: 127.0.0.1
          DB_NAME: testdb
          DB_USER: testuser
          DB_PASSWORD: testpass
          SECRET_KEY: test_secret_key_at_least_32_characters_long
          TENANT_NAME: test
          ENVIRONMENT: test
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # ── Frontend Build ──────────────────────────────────────────────────────
  frontend:
    name: Frontend — Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

      - name: Lint
        run: cd frontend && npm run lint || true


  # ── Deploy to Production ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/inphora

            echo "Pulling latest code..."
            git pull origin master

            echo "Building and restarting containers..."
            docker compose pull
            docker compose up -d --build --no-deps \
              backend_tytahj backend_amariflow backend_il frontend nginx

            echo "Cleaning up old images..."
            docker image prune -f

            echo "Verifying health..."
            sleep 15
            curl -sf http://localhost/health || echo "Warning: health check failed"
            echo "Deploy complete."
