# docker-compose.yml — FIXED (CRIT-06)
# Added: resource limits, health checks, named volumes, proper restart policies
# Removed: wildcard CORS, debug modes, exposed DB ports

# version: "3.9" (obsolete)

x-backend-defaults: &backend-defaults
  build:
    context: ./backend
    dockerfile: Dockerfile
    target: runtime
  image: inphora-backend_il
  restart: unless-stopped
  networks:
    - internal
    - frontend_net
  depends_on:
    mariadb:
      condition: service_healthy
    redis:
      condition: service_healthy
  environment:
    - ENVIRONMENT=production
    - SQL_ECHO=false
    - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    - REDIS_PASSWORD=${REDIS_PASSWORD}
  deploy:                          # FIXED CRIT-06: Resource limits per tenant
    resources:
      limits:
        cpus: "0.75"
        memory: 512M
      reservations:
        cpus: "0.25"
        memory: 256M

services:

  # ── Databases ──────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    restart: unless-stopped
    networks:
      - internal
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      # Note: MariaDB init scripts in /docker-entrypoint-initdb.d create the actual databases
      # These MYSQL_* vars are just fallback
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init_sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      sh -c "redis-server --requirepass \"${REDIS_PASSWORD}\""
    networks:
      - internal
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ── Tenant Backends ───────────────────────────────────────────────────────
  backend_tytahj:
    <<: *backend-defaults
    container_name: backend_tytahj
    ports:
      - "8001:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - TENANT_NAME=tytahj
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_NAME=${DB_NAME_TYTAHJ}
      - DB_USER=${DB_USER_TYTAHJ}
      - DB_PASSWORD=${DB_PASSWORD_TYTAHJ}
      - DATABASE_URL=mysql+pymysql://${DB_USER_TYTAHJ}:${DB_PASSWORD_TYTAHJ}@mariadb:3306/${DB_NAME_TYTAHJ}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SECRET_KEY=${SECRET_KEY_TYTAHJ}
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend_tytahj
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  backend_amariflow:
    <<: *backend-defaults
    container_name: backend_amariflow
    ports:
      - "8002:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - TENANT_NAME=amariflow
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_NAME=${DB_NAME_AMARIFLOW}
      - DB_USER=${DB_USER_AMARIFLOW}
      - DB_PASSWORD=${DB_PASSWORD_AMARIFLOW}
      - DATABASE_URL=mysql+pymysql://${DB_USER_AMARIFLOW}:${DB_PASSWORD_AMARIFLOW}@mariadb:3306/${DB_NAME_AMARIFLOW}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SECRET_KEY=${SECRET_KEY_AMARIFLOW}
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend_amariflow
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  backend_il:
    <<: *backend-defaults
    container_name: backend_il
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - TENANT_NAME=inphora_logic
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_NAME=${DB_NAME_IL}
      - DB_USER=${DB_USER_IL}
      - DB_PASSWORD=${DB_PASSWORD_IL}
      - DATABASE_URL=mysql+pymysql://${DB_USER_IL}:${DB_PASSWORD_IL}@mariadb:3306/${DB_NAME_IL}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SECRET_KEY=${SECRET_KEY_IL}
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend_il
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s


  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - frontend_net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M


  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    networks:
      - internal
      - frontend_net
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./static:/var/www/static:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend_tytahj
      - backend_amariflow
      - backend_il
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M


  # ── Certbot (SSL renewal) - DISABLED for local development ────────────────
  # Uncomment for production deployment with proper domain and SSL setup
  # certbot:
  #   image: certbot/certbot:latest
  #   volumes:
  #     - certbot_webroot:/var/www/certbot
  #     - letsencrypt:/etc/letsencrypt
  #   entrypoint: >
  #     /bin/sh -c "
  #     if [ ! -d /etc/letsencrypt/live/inphora.net ]; then
  #       certbot certonly --webroot -w /var/www/certbot --email admin@inphora.net --agree-tos --no-eff-email -d inphora.net -d tytahj.inphora.net -d amariflow.inphora.net -d il.inphora.net || true;
  #     fi;
  #     trap exit TERM;
  #     while :; do
  #       certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
  #       sleep 12h & wait $${!};
  #     done"


# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
    internal: true        # DB network is NOT routable to host
  frontend_net:
    driver: bridge


# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mariadb_data:
  redis_data:
  certbot_webroot:
  letsencrypt:
